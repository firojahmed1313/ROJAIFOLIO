// ── Reusable: SectionHeader ──
const SectionHeader = ({tag, title, hi, sub, light=true}) => (
  <div style={{marginBottom:48}}>
    <div className="sec-label">{tag}</div>
    <h2 className="sec-h2">{title}{hi && <span className="hi">{hi}</span>}</h2>
    {sub && <p className="sec-sub">{sub}</p>}
  </div>
);
// ── PROJECTS Section ──
const Projects = ({projects}) => {
  const [filter, setFilter] = React.useState('all');
  const shown = filter==='all' ? projects : projects.filter(p=>p.type===filter);
  return (
    <section className="page-section projects-bg" id="projects">
      <div className="inner">
        <SectionHeader tag="projects[]" title="My " hi="Work." sub="From enterprise systems to side experiments — all built with purpose."/>
        <div className="filter-row">
          {['all','complete','small'].map(f=>(
            <button key={f} className={`f-tab${filter===f?' active':''}`} onClick={()=>setFilter(f)}>
              {f==='all'?'all_projects':f==='complete'?'complete_builds':'mini_projects'}
            </button>
          ))}
        </div>
        <div className="proj-grid">
          {shown.map((p,i)=><ProjectCard key={p.id} project={p} idx={i}/>)}
        </div>
      </div>
    </section>
  );
};
// ── Reusable: ProjectCard ──
const ProjectCard = ({project, idx}) => (
  <div className="proj-card reveal" style={{transitionDelay:`${idx*0.08}s`}}>
    <div className="proj-img-wrap">
      <img src={project.image} alt={project.title} className="proj-img" loading="lazy"/>
      <div className="proj-overlay"/>
      <span className="proj-num">_{String(project.id).padStart(2,'0')}</span>
    </div>
    <div className="proj-body">
      <h3 className="proj-title">{project.title}</h3>
      <p className="proj-desc">{project.description}</p>
      <div className="proj-tech">
        {project.tech.map((t,i)=><span key={i} className="t-tag">{t}</span>)}
      </div>
      <div className="proj-actions">
        <a href={project.liveUrl} className="btn-live" target="_blank" rel="noopener">
          <Icons.External/> Live
        </a>
        <a href={project.githubUrl} className="btn-code" target="_blank" rel="noopener">
          <Icons.Github/> Code
        </a>
      </div>
    </div>
  </div>
);

// ── FOOTER ──
const Footer = ({personal}) => (
  <footer className="footer">
    <div className="footer-inner">
      <div className="footer-top">
        <div className="footer-brand">
          <div className="footer-logo">[firoj.ahmed]<span style={{color:'var(--text3)',fontWeight:300}}>_</span></div>
          <p className="footer-bio">Full Stack Developer building enterprise-grade systems with .NET, C# and modern web technologies. Based in {personal?.location}.</p>
          <div className="footer-socials" style={{marginTop:16}}>
            {[
              {href:personal?.socials.github,icon:<Icons.Github/>},
              {href:personal?.socials.linkedin,icon:<Icons.Linkedin/>},
              {href:personal?.socials.twitter,icon:<Icons.Twitter/>},
            ].map((s,i)=>(
              <a key={i} href={s.href} className="f-soc" target="_blank" rel="noopener">{s.icon}</a>
            ))}
          </div>
        </div>
        <div className="footer-nav">
          {['home','about','projects','experience','certificates','contact'].map(l=>(
            <a key={l} href={`#${l}`} className="f-nav-link">{l}</a>
          ))}
        </div>
      </div>
      <div className="footer-bottom">
        <span className="footer-copy">
          © {new Date().getFullYear()} <span>MD Firoj Ahmed</span> · All rights reserved
        </span>
        <div className="tech-stack-tag">
          built with <span>React</span> + <span>Vanilla CSS</span> · data from <span>portfolio.json</span>
        </div>
      </div>
    </div>
  </footer>
);

// ── Back To Top ──
const BackToTop = () => {
  const [show, setShow] = React.useState(false);
  React.useEffect(()=>{
    const h = ()=>setShow(window.scrollY>500);
    window.addEventListener('scroll',h);
    return ()=>window.removeEventListener('scroll',h);
  },[]);
  return (
    <button className={`btt${show?' show':''}`}
      onClick={()=>window.scrollTo({top:0,behavior:'smooth'})}
      aria-label="Back to top">
      <Icons.Up/>
    </button>
  );
};

// ── APP ──
const App = ({data}) => {
  // Scroll animations
  React.useEffect(()=>{
    const obs = new IntersectionObserver(entries=>{
      entries.forEach(e=>{ if(e.isIntersecting) e.target.classList.add('on') });
    },{threshold:0.08,rootMargin:'0px 0px -40px 0px'});
    document.querySelectorAll('.reveal,.reveal-left,.reveal-right').forEach(el=>obs.observe(el));
    return ()=>obs.disconnect();
  },[]);

  // Hamburger
  React.useEffect(()=>{
    const btn = document.getElementById('hamburger');
    const menu = document.getElementById('mobileMenu');
    if(!btn||!menu) return;
    const toggle = ()=>menu.classList.toggle('open');
    const close = e=>{ if(!menu.contains(e.target)&&e.target!==btn) menu.classList.remove('open') };
    btn.addEventListener('click',toggle);
    document.addEventListener('click',close);
    menu.querySelectorAll('a').forEach(a=>a.addEventListener('click',()=>menu.classList.remove('open')));
    return ()=>{ btn.removeEventListener('click',toggle); document.removeEventListener('click',close) };
  },[]);
console.log(data);
    return (
    <>
      <Projects projects={data?.projects}/>
      <Footer personal={data?.personal}/>
      <BackToTop/>
      <style>{`@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}`}</style>
    </>
  );
};
async function loadData() {
  try {
    const response = await fetch('portfolio.json');
    const data = await response.json();
    console.log(data);
    return data; 
    } catch (error) {
      console.error('Error loading JSON:', error);
    }
  }
(async () => {
  const data = await loadData();

  ReactDOM.render(
    <App data={data} />,
    document.getElementById('root')
  );
})();
</script>
