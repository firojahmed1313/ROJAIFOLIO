// ── CONTACT Section ──
const Contact = ({personal}) => {
  const [form, setForm] = React.useState({name:'',email:'',message:''});
  const [sent, setSent] = React.useState(false);
  const [loading, setLoading] = React.useState(false);
  const onChange = e => setForm({...form,[e.target.name]:e.target.value});
  const onSubmit = e => {
    e.preventDefault();
    setLoading(true);
    setTimeout(()=>{setLoading(false);setSent(true);setForm({name:'',email:'',message:''})},1200);
  };
  return (
    <section className="page-section contact-bg" id="contact">
      <div className="inner">
        <SectionHeader tag="contact.init()" title="Get In " hi="Touch." sub="Open to opportunities, collaborations, and interesting conversations."/>
        <div className="contact-grid">
          <div className="reveal-left">
            {[
              {icon:<Icons.Mail/>, label:'email', value:personal.email, href:`mailto:${personal.email}`},
              {icon:<Icons.Phone/>, label:'phone', value:personal.phone, href:`tel:${personal.phone}`},
              {icon:<Icons.Pin/>, label:'location', value:personal.location, href:null},
            ].map((item,i)=>(
              <div key={i} className="contact-item">
                <div className="ci-icon">{item.icon}</div>
                <div>
                  <div className="ci-label">{item.label}</div>
                  {item.href
                    ? <a href={item.href} className="ci-value" style={{textDecoration:'none',color:'inherit'}}>{item.value}</a>

              </div>
            ))}
            <div style={{display:'flex',gap:10,marginTop:8}}>
              {[
                {href:personal.socials.github,icon:<Icons.Github/>},
                {href:personal.socials.linkedin,icon:<Icons.Linkedin/>},
              ].map((s,i)=>(
                <a key={i} href={s.href} className="soc-btn" target="_blank" rel="noopener">{s.icon}</a>
              ))}
            </div>

            {/* QR */}
            <div style={{marginTop:28,background:'var(--surface)',border:'1px solid var(--border2)',borderRadius:12,padding:'20px',textAlign:'center'}}>
              <div style={{marginBottom:10}}>
                <svg width="80" height="80" viewBox="0 0 100 100" fill="none">
                  <rect x="8" y="8" width="32" height="32" rx="3" stroke="var(--cyan)" strokeWidth="5"/>
                  <rect x="16" y="16" width="16" height="16" fill="var(--cyan)"/>
                  <rect x="60" y="8" width="32" height="32" rx="3" stroke="var(--cyan)" strokeWidth="5"/>
                  <rect x="68" y="16" width="16" height="16" fill="var(--cyan)"/>
                  <rect x="8" y="60" width="32" height="32" rx="3" stroke="var(--cyan)" strokeWidth="5"/>
                  <rect x="16" y="68" width="16" height="16" fill="var(--cyan)"/>
                  <rect x="60" y="60" width="8" height="8" fill="var(--cyan)"/>
                  <rect x="72" y="60" width="8" height="8" fill="var(--cyan)"/>
                  <rect x="84" y="60" width="8" height="8" fill="var(--cyan)"/>
                  <rect x="60" y="72" width="8" height="8" fill="var(--cyan)"/>
                  <rect x="84" y="72" width="8" height="8" fill="var(--cyan)"/>
                  <rect x="60" y="84" width="8" height="8" fill="var(--cyan)"/>
                  <rect x="72" y="84" width="8" height="8" fill="var(--cyan)"/>
                  <rect x="84" y="84" width="8" height="8" fill="var(--cyan)"/>
                </svg>
              </div>
              <div style={{fontFamily:'var(--mono)',fontSize:'0.68rem',color:'var(--text3)'}}>scan → connect</div>
            </div>
          </div>

          <div className="form-wrap reveal-right">
            <h3 style={{fontFamily:'var(--mono)',fontSize:'0.85rem',color:'var(--cyan)',marginBottom:24}}>
              {'// send_message()'}
            </h3>
            <form onSubmit={onSubmit}>
              <label className="f-label">name</label>
              <input className="f-input" name="name" placeholder="Your name" value={form.name} onChange={onChange} required/>
              <label className="f-label">email</label>
              <input className="f-input" type="email" name="email" placeholder="your@email.com" value={form.email} onChange={onChange} required/>
              <label className="f-label">message</label>
              <textarea className="f-input f-ta" name="message" placeholder="What would you like to discuss?" value={form.message} onChange={onChange} required/>
              <button type="submit" className="f-submit" disabled={loading}>
                {loading
                  ? <span style={{display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{animation:'spin 1s linear infinite'}}><path d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" strokeOpacity="0.3"/><path d="M21 12a9 9 0 00-9-9"/></svg>
                      sending...
                    </span>
                  : <span style={{display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
                      <Icons.Send/> send_message()
                    </span>
                }
              </button>
              <div className={`f-success${sent?' show':''}`}>
                ✓ message_sent — I'll respond within 24 hours.
              </div>
            </form>
          </div>
        </div>
      </div>
    </section>
  );
};
// ── FOOTER ──

  Twitter: ()=><svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M23 3a10.9 10.9 0 01-3.14 1.53 4.48 4.48 0 00-7.86 3v1A10.66 10.66 0 013 4s-4 9 5 13a11.64 11.64 0 01-7 2c9 5 20 0 20-11.5a4.5 4.5 0 00-.08-.83A7.72 7.72 0 0023 3z"/></svg>,

// ── Reusable: SectionHeader ──
const SectionHeader = ({tag, title, hi, sub, light=true}) => (
  <div style={{marginBottom:48}}>
    <div className="sec-label">{tag}</div>
    <h2 className="sec-h2">{title}{hi && <span className="hi">{hi}</span>}</h2>
    {sub && <p className="sec-sub">{sub}</p>}
  </div>
);

// ── Back To Top ──
const BackToTop = () => {
  const [show, setShow] = React.useState(false);
  React.useEffect(()=>{
    const h = ()=>setShow(window.scrollY>500);
    window.addEventListener('scroll',h);
    return ()=>window.removeEventListener('scroll',h);
  },[]);
  return (
    <button className={`btt${show?' show':''}`}
      onClick={()=>window.scrollTo({top:0,behavior:'smooth'})}
      aria-label="Back to top">
      <Icons.Up/>
    </button>
  );
};

const App = ({data}) => {
  // Scroll animations
  React.useEffect(()=>{
    const obs = new IntersectionObserver(entries=>{
      entries.forEach(e=>{ if(e.isIntersecting) e.target.classList.add('on') });
    },{threshold:0.08,rootMargin:'0px 0px -40px 0px'});
    document.querySelectorAll('.reveal,.reveal-left,.reveal-right').forEach(el=>obs.observe(el));
    return ()=>obs.disconnect();
  },[]);

  // Hamburger
  React.useEffect(()=>{
    const btn = document.getElementById('hamburger');
    const menu = document.getElementById('mobileMenu');
    if(!btn||!menu) return;
    const toggle = ()=>menu.classList.toggle('open');
    const close = e=>{ if(!menu.contains(e.target)&&e.target!==btn) menu.classList.remove('open') };
    btn.addEventListener('click',toggle);
    document.addEventListener('click',close);
    menu.querySelectorAll('a').forEach(a=>a.addEventListener('click',()=>menu.classList.remove('open')));
    return ()=>{ btn.removeEventListener('click',toggle); document.removeEventListener('click',close) };
  },[]);

  return (
    <>
      <Contact personal={data.personal}/>
      <Footer personal={data.personal}/>
      <BackToTop/>
      <style>{`@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}`}</style>
    </>
  );
};

async function loadData() {
  try {
    const response = await fetch('portfolio.json');
    const data = await response.json();
    console.log(data);
    return data; 
    } catch (error) {
      console.error('Error loading JSON:', error);
    }
  }
(async () => {
  const data = await loadData();

  ReactDOM.render(
    <App data={data} />,
    document.getElementById('root')
  );
})();

</script>
